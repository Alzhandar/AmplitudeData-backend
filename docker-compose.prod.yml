name: amplitude_backend_prod

services:
  nginx:
    image: nginx:alpine
    ports:
      - "8008:80"
      - "4443:443"
    volumes:
      - ./docker/nginx/render-conf.sh:/docker-entrypoint.sh:ro
      - ./docker/nginx/templates:/etc/nginx/templates:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
      - static_volume:/static:ro
    entrypoint: ["sh", "/docker-entrypoint.sh"]
    environment:
      - SSL_DOMAIN=${SSL_DOMAIN:-api.avametric.online}
    depends_on:
      - web
    restart: unless-stopped

  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    restart: unless-stopped

  web:
    build: .
    command: sh /app/entrypoint.sh web-prod
    env_file:
      - .env
    restart: unless-stopped
    volumes:
      - static_volume:/app/staticfiles
    depends_on:
      - db
      - redis

  celery:
    build: .
    command: sh /app/entrypoint.sh celery
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      - db
      - redis

  celery-beat:
    build: .
    command: sh /app/entrypoint.sh beat
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      - db
      - redis

  db:
    image: postgres:14
    env_file:
      - .env
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped

volumes:
  postgres_data:
  certbot_www:
  certbot_conf:
  static_volume:
