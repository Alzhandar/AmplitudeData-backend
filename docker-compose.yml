name: amplitude_backend

services:
  web:
    container_name: amplitude_backend_web
    build: .
    command: sh /app/entrypoint.sh web
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis
                                                
  celery:
    container_name: amplitude_backend_celery
    build: .
    command: sh /app/entrypoint.sh celery
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - db
      - redis

  celery-beat:
    container_name: amplitude_backend_celery_beat
    build: .
    command: sh /app/entrypoint.sh beat
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - db
      - redis

  db:
    container_name: amplitude_backend_db
    image: postgres:14
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - .env
    ports:
      - "5432:5432"

  redis:
    container_name: amplitude_backend_redis
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
